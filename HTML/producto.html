<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro de Producto</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/app.js">
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea, input[type="number"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        input[type="submit"] { background-color: #ebb113; color: white; border: none; cursor: pointer; padding: 10px; font-size: 16px; }
        input[type="submit"]:hover { background-color: #FDD76E; }
        .required { color: red; }
        .inline-group { display: flex; gap: 10px; }
        .inline-group > div { flex: 1; }
        
    </style>
</head>
<body>
    <h1>Registro de Nuevo Producto</h1>
    <form action="#" method="POST">
        <!-- Datos básicos del producto -->
        <div class="form-group">
            <label for="nombre_producto">Nombre del Producto <span class="required">*</span></label>
            <input type="text" id="nombre_producto" name="nombre_producto" required>
        </div>

        <div class="form-group">
            <label for="codigo_producto">Código del Producto <span class="required">*</span></label>
            <input type="text" id="codigo_producto" name="codigo_producto" required placeholder="Ej: PROD-001, SKU-1234">
        </div>

        <div class="form-group">
            <label for="codigo_barras">Código de Barras (EAN/UPC)</label>
            <input type="text" id="codigo_barras" name="codigo_barras" placeholder="Ej: 7701234567890">
        </div>

        <div class="form-group">
            <label for="categoria">Categoría <span class="required">*</span></label>
            <select id="categoria" name="categoria" required>
                <option value="">Seleccionar</option>
                <option value="alimentos">Alimentos y Bebidas</option>
                <option value="hogar">Artículos del Hogar</option>
                <option value="tecnologia">Tecnología y Electrónica</option>
                <option value="construccion">Materiales de Construcción</option>
                <option value="moda">Moda y Accesorios</option>
                <option value="otro">Otro</option>
            </select>
        </div>

        <div class="form-group">
            <label for="descripcion">Descripción Detallada <span class="required">*</span></label>
            <textarea id="descripcion" name="descripcion" rows="3" required placeholder="Características, composición, usos, etc."></textarea>
        </div>
        <!-- Datos de precios y existencias -->
        <h3>Precios y Existencias</h3>
        <div class="inline-group">
            <div class="form-group">
                <label for="precio_compra">Precio de Compra (COP) <span class="required">*</span></label>
                <input type="number" id="precio_compra" name="precio_compra" step="0.01" min="0" required>
            </div>
            <div class="form-group">
                <label for="precio_venta">Precio de Venta (COP) <span class="required">*</span></label>
                <input type="number" id="precio_venta" name="precio_venta" step="0.01" min="0" required>
            </div>
        </div>

        <div class="inline-group">
            <div class="form-group">
                <label for="stock_actual">Stock Actual <span class="required">*</span></label>
                <input type="number" id="stock_actual" name="stock_actual" min="0" required>
            </div>

            <div class="form-group">
                <label for="stock_minimo">Stock Mínimo Recomendado</label>
                <input type="number" id="stock_minimo" name="stock_minimo" min="0">
            </div>
        </div>
        <div class="form-group">
            <label for="fecha_vencimiento">Fecha de Vencimiento (si aplica)</label>
            <input type="date" id="fecha_vencimiento" name="fecha_vencimiento">
        </div>

        <div class="form-group">
            <label for="origen">Origen del Producto</label>
            <input type="text" id="origen" name="origen" placeholder="Ej: Colombia, China, Estados Unidos">
        </div>

        <div class="form-group">
            <label for="observaciones">Observaciones Adicionales</label>
            <textarea id="observaciones" name="observaciones" rows="2" placeholder="Restricciones, garantías, condiciones de almacenamiento, etc."></textarea>
        </div>

        <div class="form-group">
            <input type="checkbox" id="acepta_validacion" name="acepta_validacion" required>
            <label for="acepta_validacion">He verificado que toda la información es correcta <span class="required">*</span></label>
        </div>

        <input type="submit" value="Registrar Producto">
    </form>
</body>
</html
