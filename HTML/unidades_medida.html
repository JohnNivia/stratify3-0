<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidades de medida</title>

    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/app.js">
    <style>
        body{ font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 15px;}
        .form-group {margin-bottom: 15px;}
        input, select, textarea{ width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;}
        input[type="submit"] { background-color: #ebb113; color: black; border: none; cursor: pointer; padding: 10px; font-size: 16px;}
        input[type="submit"]:hover{ background-color: #FDD76E;} 
        .required {color: red;}

    </style>
</head>
    
<body>
    <h1>Unidades de medida</h1>
    <div class="form-group">
    <label for="unidades_de _medida">Unidades de medida <span class="required">*</span></label>
    <select name="unidades" id="unidades_de _medida"required>
        <option value="">Seleccionar</option>
        <option value="L">Litros</option>
        <option value="Ml">Mililitros</option>
        <option value="C">Centimetros</option>
    </select>
        <button type="submit">Registrar Unidad de Medida</button>
    </div>

</body>
</html>
